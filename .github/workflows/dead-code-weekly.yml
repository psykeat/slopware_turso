name: Dead Code Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  dead-code:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dead code check
        run: pnpm fallow dead-code --no-cache
